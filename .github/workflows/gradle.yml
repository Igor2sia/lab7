name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  schedule:
    # Каждую среду в 12:30 по Москве
    - cron: '30 9 * * 3'

    # Каждую пятницу в 22:00 по Москве
    - cron: '0 19 * * 5'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }} / Java ${{ matrix.java-version }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: [11, 13, 17]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Grant execute permission for Gradle wrapper
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build with Gradle on Linux/macOS
        if: runner.os != 'Windows'
        run: ./gradlew build

      - name: Build with Gradle on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat build
